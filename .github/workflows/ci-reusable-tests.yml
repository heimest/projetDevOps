# Étape CI : JUnit + JaCoCo.
# Appelé depuis action.yml uniquement (workflow_call).
# Les tests d’intégration utilisent Testcontainers (URL jdbc:tc: en profil test) : l’exécuteur
# ubuntu-latest fournit Docker, requis par le driver org.testcontainers.jdbc.

on:
  workflow_call:

jobs:
  tests:
    name: Tests (JUnit + JaCoCo)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Download compiled workspace
        uses: actions/download-artifact@v4
        with:
          name: gradle-build
          path: .

      - name: Run tests and generate JaCoCo reports
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport --no-daemon

      - name: Publish test results to GitHub Checks
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: build/test-results/test/TEST-*.xml
          reporter: java-junit

      - name: Upload test reports, JaCoCo XML/HTML and classes for Sonar
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tests-coverage-outputs
          retention-days: 2
          path: |
            build/test-results
            build/reports/tests
            build/reports/jacoco
            build/jacoco
            build/classes
            build/resources
