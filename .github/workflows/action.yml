# Orchestrateur CI : une exécution, plusieurs fichiers (ci-reusable-*.yml) via workflow_call.
# Même comportement qu’avant : build → tests → coverage → sonar → docker (gate Sonar).
#
# Secrets optionnels :
#   SONAR_TOKEN      — SonarCloud (obligatoire pour que le job sonar réussisse ; non testable dans `if:` job, voir doc GitHub)
#   CODECOV_TOKEN    — Codecov

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/ci-reusable-build.yml
    secrets: inherit

  tests:
    needs: [ build ]
    uses: ./.github/workflows/ci-reusable-tests.yml
    secrets: inherit

  coverage:
    needs: [ tests ]
    uses: ./.github/workflows/ci-reusable-coverage.yml
    secrets: inherit

  sonar:
    needs: [ coverage ]
    # `secrets` n’est pas autorisé dans `if:` au niveau job (erreur « Unrecognized named-value: secrets »).
    # On limite Sonar aux dépôts non-fork et aux PR internes (pas de PR depuis un fork externe).
    if: >-
      github.event.repository.fork == false
      && (github.event_name != 'pull_request'
          || github.event.pull_request.head.repo.full_name == github.repository)
    uses: ./.github/workflows/ci-reusable-sonar.yml
    secrets: inherit

  docker:
    needs: [ coverage, sonar ]
    if: >-
      always()
      && needs.coverage.result == 'success'
      && (needs.sonar.result == 'success' || needs.sonar.result == 'skipped')
    uses: ./.github/workflows/ci-reusable-docker.yml
    secrets: inherit
