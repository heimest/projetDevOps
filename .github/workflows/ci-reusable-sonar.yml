# Étape CI : SonarCloud (Quality Gate via build.gradle).
# Appelé depuis action.yml uniquement (workflow_call).

on:
  workflow_call:

jobs:
  sonar:
    name: Quality (SonarCloud)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('build.gradle') }}
          restore-keys: ${{ runner.os }}-sonar-

      # 1) Compiler d’abord : bytecode aligné sur les sources du checkout.
      # 2) Puis télécharger l’artefact des tests : rapport JaCoCo sous build/reports/jacoco/…
      # Si l’ordre est inversé, compileJava peut faire disparaître le XML et Sonar affiche
      # « No coverage report can be found with sonar.coverage.jacoco.xmlReportPaths=… » puis QG rouge.
      - name: Compile Java sources and tests (bytecode for Sonar)
        run: |
          chmod +x gradlew
          ./gradlew compileJava compileTestJava --no-daemon

      - name: Download tests and coverage outputs (JaCoCo + classes CI)
        uses: actions/download-artifact@v4
        with:
          name: tests-coverage-outputs
          path: .

      - name: Restore build/ layout (upload-artifact v4 LCA strips build/ prefix)
        uses: ./.github/actions/normalize-v4-build-artifact

      - name: Verify JaCoCo XML is present for Sonar
        run: test -f build/reports/jacoco/test/jacocoTestReport.xml

      # Quality Gate : configurée dans build.gradle (sonar.qualitygate.wait=true).
      # Ce job échoue donc si SonarCloud retourne une gate rouge, pas seulement en cas d’erreur réseau/Gradle.
      - name: Run Sonar analysis
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew sonar --no-daemon -x test -x bootJar
