# Étape CI : SonarCloud (Quality Gate via build.gradle).
# Appelé depuis action.yml uniquement (workflow_call).

on:
  workflow_call:

jobs:
  sonar:
    name: Quality (SonarCloud)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('build.gradle') }}
          restore-keys: ${{ runner.os }}-sonar-

      # Même jeu de fichiers que l’étape coverage (tests + JaCoCo + classes). On évite un 2ᵉ artefact
      # `sonar-inputs` : sans checkout dans coverage, un chemin manquant + if-no-files-found=warn
      # peut ne rien uploader tout en laissant le job « vert » → Sonar ne trouvait pas sonar-inputs.
      - name: Download tests and coverage outputs for analysis
        uses: actions/download-artifact@v4
        with:
          name: tests-coverage-outputs
          path: .

      # Recompiler : le scanner Java exige des .class (sonar.java.binaries) ; l’artefact seul peut être incomplet
      # ou ignoré selon la version Gradle / le plugin Sonar.
      - name: Compile Java sources and tests (bytecode for Sonar)
        run: |
          chmod +x gradlew
          ./gradlew compileJava compileTestJava --no-daemon

      # Quality Gate : configurée dans build.gradle (sonar.qualitygate.wait=true).
      # Ce job échoue donc si SonarCloud retourne une gate rouge, pas seulement en cas d’erreur réseau/Gradle.
      - name: Run Sonar analysis
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew sonar --no-daemon -x test -x bootJar
