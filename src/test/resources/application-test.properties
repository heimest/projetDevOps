# Profil « test »: PostgreSQL géré par Testcontainers (URL « jdbc:tc: »), compatible avec
# plusieurs @SpringBootTest cachés (pas d’héritage de @DynamicPropertySource à anticiper).
# Voir: https://java.testcontainers.org/modules/databases/jdbc/
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///tpdevops
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.hikari.maximum-pool-size=4
spring.main.banner-mode=off
