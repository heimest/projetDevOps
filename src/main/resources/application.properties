spring.application.name=tpdevops
server.port=8090
#
# Datasource (prod / local) : en absence de variables d'environnement, on pointe sur une instance
# lancée via `docker compose up -d` (fichier docker-compose.yml à la racine du dépôt).
#
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tpdevops}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tpdevops}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tpdevops}
spring.datasource.hikari.maximum-pool-size=10
#
# JPA : Flyway crée/valide le schéma — Hibernate se contente d'aligner le modèle.
#
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
# Évite les noms de type enum Java dans les logs; les colonnes passent en VARCHAR côté DB (voir V1__).
#
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
#
# Logs SQL utiles en dev; désactiver en production via SPRING_JPA_SHOW_SQL=false
#
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
